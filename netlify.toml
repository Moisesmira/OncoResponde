[build]
command = "npm ci --include=dev --no-audit --no-fund && npm run build"
publish = "dist"
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "20"
NPM_FLAGS = "--no-audit --no-fund --progress=false"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/index.html"
  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/sw.js"
  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
